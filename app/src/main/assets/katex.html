<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: BODY_COLOR;
    background: transparent;
    padding: 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
  .katex { font-size: 1.05em; }
  p { margin-bottom: 0.5em; }
  p:last-child { margin-bottom: 0; }
  /* Fallback styling when KaTeX fails to load */
  .katex-error { color: inherit; font-family: monospace; font-size: 0.9em; }
</style>
</head>
<body>
<div id="content"></div>
<script>
function renderContent(text) {
  // Convert markdown-style formatting minimally
  // Convert newlines to paragraphs
  var html = text
    .split(/\n\n+/)
    .map(function(p) { return '<p>' + p.replace(/\n/g, '<br>') + '</p>'; })
    .join('');
  document.getElementById('content').innerHTML = html;
  renderMathInElement(document.getElementById('content'), {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false
  });
  // Notify Android of rendered height
  setTimeout(function() {
    window.AndroidBridge.onHeightReady(document.body.scrollHeight);
  }, 100);
}
</script>
</body>
</html>
